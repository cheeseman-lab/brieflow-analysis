# screen.yaml — description of the experimental setup.

# =========================================================================
# collection
# =========================================================================
collection:
  title: null
  publication_doi: null

# =========================================================================
# experiment (ontology-tagged for BIA archival)
# =========================================================================
experiment:
  screen_title: null                              # short slug; matches conda env brieflow_<id>
  organism_ontology_term_id: "NCBITaxon:9606"     # default = human
  organism: "Homo sapiens"
  tissue_ontology_term_id: null                   # e.g. CVCL_0030 for HeLa
  tissue: null                                    # e.g. "HeLa"
  tissue_type: "cell line"
  disease_ontology_term_id: "PATO:0000461"
  disease: "normal"
  development_stage_ontology_term_id: "na"
  development_stage: "na"
  assay_ontology_term_id: "EFO:0022605"
  assay: "optical pooled screening"
  pseudobulk: []


# =========================================================================
# cellular
# =========================================================================
cellular:
  growth_conditions: null
  plate_type: null
  imaging_timepoint: null                         # e.g. "78 hours post-transfection"
  seeding:
    density_cells_cm2: null
  induction:
    duration: ""

# =========================================================================
# library
# =========================================================================
library:
  vector: null
  gene_selection: null
  positive_controls: []
  negative_controls: ["nontargeting"]
  type: null                                      # simple | multi  (sgRNA-level vs MAP+RECOMB barcoding)
  detection_target: null                          # DNA | RNA — DNA barcodes give NUCLEAR spots; RNA (T7-amplified or mRNA) gives NON-NUCLEAR (cytoplasmic) spots. Drives SBS pipeline spot mask + RECONCILE.
  number_of_genes: null
  raw_design_table_fp: null                       # INPUT path: raw guide RNA design TSV (e.g. "config/barcode_library_design.tsv")
  # --- simple mode (type: simple): one barcode column ---
  barcode_col: null                               # sgRNA-sequence column name in raw_design_table_fp (canonical: "sgRNA")
  # --- multi mode (type: multi): two barcode columns + per-region lengths + sequencing order ---
  barcode_col_map: null                           # column name for MAP-region barcode sequences (e.g. "iBAR_2")
  barcode_col_recomb: null                        # column name for RECOMB-region barcode sequences (e.g. "iBAR_1")
  barcode_length_map: null                        # length of MAP region in cycles (e.g. 12)
  barcode_length_recomb: null                     # length of RECOMB region in cycles (e.g. 2)
  sequencing_order: null                          # "map_recomb" (MAP first) | "recomb_map" (RECOMB first) — which region is sequenced first across cycles
  gene_symbol_col: null                           # canonical: "gene_symbol"
  gene_id_col: null                               # canonical: "gene_id"

# =========================================================================
# iss (in-situ sequencing / SBS)
# =========================================================================
iss:
  cycles: null
  objective: null                                 # e.g. "10X 0.45 NA"
  chemistry: "four color"
  channels:                                       # one entry per imaging channel
    - { name: "DAPI", laser_wavelength_nm: 408, exposure_time_ms: null }
    - { name: "G",    laser_wavelength_nm: null, exposure_time_ms: null }
    - { name: "T",    laser_wavelength_nm: null, exposure_time_ms: null }
    - { name: "A",    laser_wavelength_nm: null, exposure_time_ms: null }
    - { name: "C",    laser_wavelength_nm: null, exposure_time_ms: null }
  binning: null                                   # 1 (none) | 2 (2x2)  — used with objective for DET_RANGE
  cycle_order: "GTAC"                             # base order across the 4 sequencing channels
  background_channel:                             # which base channel/cycle to use as background
    channel: null
    cycle: null

# =========================================================================
# phenotype
# =========================================================================
phenotype:
  objective: null                                 # e.g. "20X 0.75 NA"
  channels:                                       # one entry per phenotype channel
    # biological_name is what features get named (DAPI_mean, CENPA_mean, …).
    # fluorophore_token is what appears in the raw filename (DAPI, GFP, A594, A750).
    # The wizard uses this mapping to skip the F-014 channel-mapping interview prompt.
    - biological_name: null                       # e.g. "DAPI"
      marker_of: null                             # e.g. "Nuclei"
      fluorophore_token: null                     # filename token (e.g. "GFP" stains "COXIV")
      laser_wavelength_nm: null
      exposure_time_ms: null
    # ... add one entry per channel ...
  binning: null                                   # 1 (none) | 2 (2x2)
  segment_cells: null                             # true = segment cells around each nucleus (cellpose cyto); false = nuclei-only feature extraction (skip cellpose cell mask)
  background_channel_cell: null                   # biological_name of the cell-boundary marker (e.g. "WGA"); required only when segment_cells: true

# =========================================================================
# microscope
# =========================================================================
microscope:
  system: null

# =========================================================================
# pipeline (where brieflow lives + which env runs it)
# =========================================================================
pipeline:
  github: "cheeseman-lab/brieflow"
  version: null                                   # branch or tag (e.g. "zarr3-merge-main-speed")
  conda_env: null                                 # e.g. "brieflow_<screen>"

# =========================================================================
# data (where the raw images are)
# =========================================================================
data:
  storage_format: null                            # nd2 | tiff | zarr
  location: null                                  # base path (e.g. /archive/cheeseman/ops_data/<screen>)
  input_sbs_dir: null                             # raw SBS images dir
  input_phenotype_dir: null                       # raw phenotype images dir

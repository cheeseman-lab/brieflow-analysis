# Screen Information
experiment:
  id: "baker"  # Experiment identifier

# Cellular Conditions
cellular:
  cell_line: "HeLa"
  imaging_timepoint: "78 hours post-transfection"  # Timepoint
  treatment:
    summary: "400 pilot genes"
  plates: "1"  # Number of plates
  wells_per_plate: "6"  # Number of wells per plate

# Sequencing by Synthesis (SBS)
sbs:
  cycles: "9"  # Number of cycles
  cycle_order: "GTAC"  # Order of cycles
  background_channel: "C, cycle 9"  # Suggested background channel
  library_details:
    number_of_genes: "400"
    other_information: "Part of 400 pilot genes screening library"

# Phenotype (PH) Steps
phenotype:
  background_channel_cell: "WGA"  # For cell segmentation
  
  # Rounds of staining/imaging (all stains in one round)
  rounds:
    - round_number: 1
      stains:
        - name: "DAPI"
          marker_of: "Nuclei"
          channel: "DAPI"
        - name: "CENPA antibody"
          marker_of: "Centromeric protein"
          channel: "CENPA"
        - name: "COXIV antibody"
          marker_of: "Mitochondrial marker"
          channel: "COXIV"
        - name: "WGA"
          marker_of: "Cell membrane/boundary"
          channel: "WGA"

# Data Generated
data:
  storage_format: "nd2"  # e.g., .nd2, .tiff
  location: "/archive/cheeseman/ops_data/baker"  # Base path for data storage
  conda-env: brieflow_zarr3_speed
  notes: "Part of 400 pilot genes screening library"

# ~BrieFlow analysis configuration file~

# All paths are resolved relative to the directory the workflow is run from.

# Parameters:
all:
  root_fp: brieflow_output/
  image_format: zarr
  zarr_max_levels: 1  # Number of pyramid resolution levels (1 = no downsampling)
preprocess:
  sbs_samples_fp: config/sbs_samples.tsv
  sbs_combo_fp: config/sbs_combo.tsv
  phenotype_samples_fp: config/phenotype_samples.tsv
  phenotype_combo_fp: config/phenotype_combo.tsv
  phenotype_channels_metadata:
  - name: DAPI
    index: 0
    channel_type: fluorescence
    color: "0000FF"
    description: "Nuclear stain"
    biological_annotation:
      biological_target: "nucleus"
      marker: "DAPI"
      marker_type: "dye"
      full_label: "nucleus, DAPI"
  - name: COXIV
    index: 1
    channel_type: fluorescence
    color: "00FF00"
    description: "Mitochondria marker"
    biological_annotation:
      biological_target: "mitochondria"
      marker: "COXIV"
      marker_type: "antibody"
      full_label: "mitochondria, COXIV"
  - name: CENPA
    index: 2
    channel_type: fluorescence
    color: "FF0000"
    description: "Centromere marker"
    biological_annotation:
      biological_target: "centromere"
      marker: "CENPA"
      marker_type: "antibody"
      full_label: "centromere, CENPA"
  - name: WGA
    index: 3
    channel_type: fluorescence
    color: "FF00FF"
    description: "Membrane stain"
    biological_annotation:
      biological_target: "cell_membrane"
      marker: "WGA"
      marker_type: "lectin"
      full_label: "cell membrane, WGA"
  sbs_channels_metadata:
  - name: DAPI
    index: 0
    channel_type: fluorescence
    color: "0000FF"
    description: "Nuclear stain for SBS"
    biological_annotation:
      biological_target: "nucleus"
      marker: "DAPI"
      marker_type: "dye"
      full_label: "nucleus, DAPI"
  - name: G
    index: 1
    channel_type: fluorescence
    color: "00FF00"
    description: "SBS base channel G"
    biological_annotation:
      biological_target: "in_situ_sequencing"
      marker: "SBS_G"
      marker_type: "sequencing_chemistry"
      full_label: "SBS base G"
  - name: T
    index: 2
    channel_type: fluorescence
    color: "FF0000"
    description: "SBS base channel T"
    biological_annotation:
      biological_target: "in_situ_sequencing"
      marker: "SBS_T"
      marker_type: "sequencing_chemistry"
      full_label: "SBS base T"
  - name: A
    index: 3
    channel_type: fluorescence
    color: "FFFF00"
    description: "SBS base channel A"
    biological_annotation:
      biological_target: "in_situ_sequencing"
      marker: "SBS_A"
      marker_type: "sequencing_chemistry"
      full_label: "SBS base A"
  - name: C
    index: 4
    channel_type: fluorescence
    color: "FF00FF"
    description: "SBS base channel C"
    biological_annotation:
      biological_target: "in_situ_sequencing"
      marker: "SBS_C"
      marker_type: "sequencing_chemistry"
      full_label: "SBS base C"
  sbs_data_format: nd2
  sbs_data_organization: well
  sbs_channel_order:
  - Dapi_1p-CY3_30p_545-A594_30p-CY5_30p-CY7_30p
  - CY3_30p_545
  - A594_30p
  - CY5_30p
  - CY7_30p
  sbs_channel_order_flip: false
  sbs_n_z_planes: null
  sbs_metadata_samples_df_fp: null
  phenotype_data_format: nd2
  phenotype_data_organization: well
  phenotype_channel_order:
  - DAPI_1x1
  - GFP_1x1
  - A594_1x1
  - A750_1x1
  phenotype_channel_order_flip: false
  phenotype_round_order:
  - 1
  phenotype_n_z_planes: null
  phenotype_metadata_samples_df_fp: null
  sample_fraction: 0.5
sbs:
  alignment_method: null
  barcode_col: sgRNA
  barcode_type: simple
  bases:
  - G
  - T
  - A
  - C
  call_reads_method: median
  cell_cellprob_threshold: 0
  cell_diameter: 24.174717186214192
  cell_flow_threshold: 1
  cellpose_model: cyto3
  channel_names:
  - DAPI
  - G
  - T
  - A
  - C
  cyto_cycle: 9
  cyto_cycle_index: 8
  cyto_index: 4
  cyto_model: cyto3
  dapi_cycle: 1
  dapi_cycle_index: 0
  dapi_index: 0
  df_barcode_library_fp: config/barcode_library.tsv
  error_correct: false
  extra_channel_indices:
  - 0
  gpu: false
  heatmap_plate: 6W
  heatmap_shape: square
  manual_background_cycle_index: null
  manual_channel_mapping: null
  max_filter_width: 3
  mode: null
  nuclei_cellprob_threshold: 0.0
  nuclei_diameter: 10.524820207108489
  nuclei_flow_threshold: 0.4
  peak_width: 5
  prefix_col: prefix
  q_min: 0
  reconcile: contained_in_cells
  segment_cells: true
  segmentation_method: cellpose
  skip_cycles_indices: null
  sort_calls: count
  spot_detection_method: standard
  threshold_peaks: 300
  upsample_factor: 2
  window: 2
phenotype:
  align: true
  cell_diameter: 72.94427841011642
  cellpose_model: cyto3
  cellprob_threshold: 0.0
  channel_names:
  - DAPI
  - COXIV
  - CENPA
  - WGA
  cp_method: cp_emulator
  cyto_index: 1
  dapi_index: 0
  flow_threshold: 0.4
  foci_channel_index: 2
  gpu: false
  heatmap_plate: 6W
  heatmap_shape: square
  mode: null
  nuclei_diameter: 48.415224897313394
  reconcile: contained_in_cells
  remove_channel: null
  riders:
  - 2
  - 3
  segment_cells: true
  segmentation_method: cellpose
  source: 1
  target: 0
merge:
  approach: fast
  merge_combo_fp: config/merge_combo.tsv
  phenotype_dimensions:
  - 2400
  - 2400
  sbs_dimensions:
  - 1200
  - 1200
  sbs_metadata_cycle: 1
  score: 0.1
  threshold: 2
  sbs_metadata_channel: null
  ph_metadata_channel: null
  alignment_flip_x: false
  alignment_flip_y: false
  alignment_rotate_90: false
  sbs_dedup_prior:
    mapped_single_gene: false
    fov_distance_1: true
  pheno_dedup_prior:
    fov_distance_0: true
  # initial_sites copied from baker's config.yml (baker-tuned for this dataset).
  # Previous values (from small_test_analysis fixture) didn't fit baker's data:
  # fast_alignment hit 0 initial sites passing thresholds, then crashed in
  # multistep_alignment's df.query() against an empty df. Schema-vs-values
  # boundary: shape comes from canonical, values come from the source screen.
  initial_sites:
  - - 1
    - 1
  - - 186
    - 50
  - - 548
    - 150
  - - 656
    - 174
  - - 887
    - 225
  - - 1279
    - 331
  det_range:
  - 0.06
  - 0.065

classify:
  # Skipping classifier entirely for the plugin-validation test (no scientific
  # cell-stage labeling needed; baker's binary model is incompatible with this
  # brieflow's expected `cell_stage` output column, and we don't have a model
  # tuned for baker's actual data). Required corollary: aggregate_combo.tsv
  # and cluster_combo.tsv must contain only `cell_class=all` rows — split_datasets
  # at line 159 reads metadata["class"] for any non-"all" class, which doesn't
  # exist when the classifier didn't run.
  classifier_path: null
  confidence_thresholds:
    1:
      threshold: 0.5
      mode: exclude
    2:
      threshold: 0.5
      mode: exclude
  metadata_cols_fp: config/cell_data_metadata_cols.tsv
  class_title: cell_stage
  class_mapping:
    label_to_class:
      1: Mitotic
      2: Interphase

aggregate:
  agg_method: median
  aggregate_combo_fp: config/aggregate_combo.tsv
  batch_cols:
  - plate
  - well
  # Speed-branch's brieflow merge output uses cell_barcode_0/cell_barcode_1
  # column names (verified from split_datasets failure 2026-05-01: error listed
  # cell_barcode_0/cell_barcode_1/gene_symbol_1 as the unmapped columns).
  # Earlier I had incorrectly ported baker's `sgRNA_0` here — baker's older
  # brieflow used a different column name for the same logical field. Schema
  # values must match what THIS brieflow's merge phase emits, not what baker's
  # brieflow used.
  collapse_cols:
  - cell_barcode_0
  - gene_symbol_0
  contamination: 0.01
  control_key: nontargeting
  drop_cols_threshold: 0.1
  drop_rows_threshold: 0.01
  # filter_queries from baker — keeps only single-mapped-gene cells.
  filter_queries:
  - mapped_single_gene == True
  impute: true
  metadata_cols_fp: config/cell_data_metadata_cols.tsv
  perturbation_id_col: cell_barcode_0
  perturbation_name_col: gene_symbol_0
  variance_or_ncomp: 0.99
  num_align_batches: 1
  ps_auc_threshold: 0.6
  perturbation_score_threshold: 0.5
  skip_perturbation_score: true
  ps_probability_threshold: null
  ps_percentile_threshold: null
  feature_normalization: mad
  num_sims: 100
  exclusion_string: null
  # bootstrap_combinations was [{cell_class: Interphase, ...}] from canonical;
  # but with classifier disabled, no cells get Interphase labels and the
  # Interphase merge_data parquet ends up empty, crashing generate_feature_table.
  # Switched to cell_class=all to match the rest of the disabled-classifier scope.
  bootstrap_combinations:
  - cell_class: all
    channel_combo: DAPI_COXIV_CENPA_WGA

cluster:
  cluster_combo_fp: config/cluster_combo.tsv
  uniprot_data_fp: config/benchmark_clusters/uniprot_data.tsv
  corum_group_benchmark_fp: config/benchmark_clusters/corum_group_benchmark.tsv
  kegg_group_benchmark_fp: config/benchmark_clusters/kegg_group_benchmark.tsv
  # leiden_resolutions + min_cell_cutoffs from baker's config.yml.
  # Baker sweeps resolutions 2..10 (canonical small_test only had [2]) and
  # uses 5-cell minima per class (canonical: 0).
  leiden_resolutions:
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  - 9
  - 10
  min_cell_cutoffs:
    all: 5
    Interphase: 5
    Mitotic: 5
  phate_distance_metric: euclidean
  string_pair_benchmark_fp: config/benchmark_clusters/string_pair_benchmark.tsv
  perturbation_auc_threshold: null
